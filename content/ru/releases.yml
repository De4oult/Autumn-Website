title: Заметки о релизах Autumn и ключевых этапах развития фреймворка.
description: Посмотрите, как Autumn развивается от релиза к релизу — от изменений в ядре до новых возможностей.

releases:
  - version: v0.1.4
    date: 5 июня 2026
    changes:
      - "Добавлена `WebUIConfiguration` для настройки доступности Web UI, тем оформления, анимаций листьев и разрешённых окружений"
      - "Добавлены перечисления `Environment` и `Theme` для типобезопасной конфигурации приложения"
      - "Появился декоратор @only для ограничения контроллеров, сервисов, зависимостей, middleware и hooks определёнными окружениями"
      - "Компоненты, недоступные в текущем окружении, автоматически исключаются из DI-контейнера, маршрутизации и OpenAPI-документации"
      - "Добавлена проверка графа зависимостей при запуске приложения для раннего обнаружения зависимостей от отключённых провайдеров"
      - "Улучшена генерация OpenAPI-схем для Pydantic-моделей и классов, помеченных через @serializable"
      - "Добавлен анализ возвращаемых значений `JSONResponse`, пользовательских моделей, `dict` и `list` при построении OpenAPI-документации"
      - "Добавлена автоматическая документация HTTP-ошибок на основе `raise HTTPException(...)`"
      - "Добавлена поддержка нескольких вариантов ответа через OpenAPI `oneOf` и улучшена работа с пользовательскими `Response`-классами"
      - "Обновлён интерфейс документации: исправлено отображение листьев, добавлены эффекты прозрачности и blur, улучшена обработка длинных названий в sidebar"

  - version: v0.1.1
    date: 17 апреля 2026
    changes:
      - "Снижен overhead на горячем пути HTTP-запроса"
      - "Контейнер зависимостей активнее использует кеши и выполняет меньше повторной работы"
      - "Быстрее стали вызовы controller handlers и внутренний runtime pipeline"
      - "Улучшены роутинг и выбор middleware на горячем пути"
      - "Ускорены JSON-ответы и обработка тела запроса"
      - "`dict` и `list` теперь можно возвращать из handler'ов напрямую с автоматической JSON-оберткой"
      - "Добавлен @serializable для явной сериализации пользовательских классов"
      - "Появились `Public[T]` и `Private[T]` для разделения публичных и внутренних полей сериализуемого класса"
      - "OpenAPI теперь лучше описывает ответы для пользовательских сериализуемых объектов"
      - "Добавлены in-controller middleware methods: @middleware, @middleware.before и @middleware.after"

  - version: v0.1.0
    date: 14 апреля 2026
    changes:
      - "Базовая поддержка маршрутизации и контроллеров"
      - "Контейнер внедрения зависимостей"
      - "Декларативная конфигурация"
      - "Автоматически создаваемая OpenAPI-документация и граф зависимостей"
      - "Интеграция с Uvicorn через ASGI"
