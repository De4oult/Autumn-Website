<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 · Autumn Framework</title>
    <meta name="description" content="The requested page could not be found on the Autumn Framework website.">
    <meta name="robots" content="noindex, follow">
    <style>
        :root {
            color-scheme: dark;
            --bg: #1a1512;
            --bg-soft: rgba(42, 35, 32, 0.72);
            --accent: #f39c12;
            --accent-dark: #e67e22;
            --text: #faf8f5;
            --text-secondary: #a89a8c;
            --border: rgba(243, 156, 18, 0.16);
            --shadow: 0 30px 120px rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
        }

        .shell {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 560px);
            border: 1px solid var(--border);
            border-radius: 32px;
            background: var(--bg-soft);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            padding: 56px 32px;
            text-align: center;
        }

        .brand {
            margin-bottom: 28px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .code {
            margin: 0;
            color: var(--accent);
            font-size: clamp(96px, 18vw, 160px);
            font-weight: 800;
            line-height: 0.88;
        }

        .title {
            margin: 16px 0 0;
            font-size: clamp(24px, 5vw, 34px);
            font-weight: 600;
            line-height: 1.2;
            text-transform: lowercase;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            margin-top: 28px;
            padding: 0 24px;
            border-radius: 14px;
            background: var(--accent);
            color: #1a1512;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 180ms ease, transform 180ms ease;
        }

        .button:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }

        .hint {
            margin-top: 18px;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 640px) {
            .card {
                border-radius: 28px;
                padding: 44px 24px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="card">
            <div class="brand">Autumn Framework</div>
            <h1 class="code">404</h1>
            <p class="title" id="title">not found</p>
            <a class="button" id="home-link" href="/en">back home</a>
            <p class="hint" id="hint">The page you requested does not exist anymore.</p>
        </section>
    </main>

    <script>
        (function () {
            var isRu = window.location.pathname === '/ru' || window.location.pathname.indexOf('/ru/') === 0;
            var copy = isRu
                ? {
                    lang: 'ru',
                    title: 'не найдено',
                    button: 'вернуться на главную',
                    hint: 'Страница, которую вы открыли, больше не существует.',
                    href: '/ru',
                    pageTitle: '404 · Autumn Framework',
                    description: 'Запрошенная страница не найдена на сайте Autumn Framework.'
                }
                : {
                    lang: 'en',
                    title: 'not found',
                    button: 'back home',
                    hint: 'The page you requested does not exist anymore.',
                    href: '/en',
                    pageTitle: '404 · Autumn Framework',
                    description: 'The requested page could not be found on the Autumn Framework website.'
                };

            document.documentElement.lang = copy.lang;
            document.title = copy.pageTitle;
            document.querySelector('meta[name="description"]').setAttribute('content', copy.description);
            document.getElementById('title').textContent = copy.title;
            document.getElementById('home-link').textContent = copy.button;
            document.getElementById('home-link').setAttribute('href', copy.href);
            document.getElementById('hint').textContent = copy.hint;
        }());
    </script>
</body>
</html>
